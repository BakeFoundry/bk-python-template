---
- name: Bake Python Application AMI
  hosts: all
  become: yes
  vars:
    app_dir: /opt/python-app
    python_version: python3
    pip_executable: pip3

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install system dependencies
      apt:
        name:
          - "{{ python_version }}"
          - python3-pip
          - python3-venv
        state: present
      when: ansible_os_family == "Debian"

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user | default('ubuntu') }}"

    - name: Copy application source
      copy:
        src: ../../src/
        dest: "{{ app_dir }}/src/"
        mode: '0755'

    - name: Copy requirements file
      copy:
        src: ../../requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        mode: '0644'

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        executable: "{{ pip_executable }}"

    - name: Set up application entry point (example script)
      copy:
        content: |
          #!/bin/bash
          cd {{ app_dir }}
          export FLASK_APP=src/app.py
          {{ python_version }} -m flask run --host=0.0.0.0
        dest: /usr/local/bin/run-app
        mode: '0755'
